<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambright Placement Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .hidden {
            display: none;
        }
        .timer {
            font-size: 24px;
            font-weight: bold;
            color: green;
        }
        .start-btn {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
    <script>
        let timeLeft = 50 * 60;
        let shiftBlocked = false;

        function startExam() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('exam-content').classList.remove('hidden');
            startTimer();
        }

        function startTimer() {
            const timerElement = document.getElementById('timer');
            setInterval(() => {
                if (timeLeft <= 0) {
                    alert("Time's up! Your test has been submitted.");
                    document.getElementById('exam-form').submit();
                }
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                timerElement.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                if (timeLeft <= 600) {
                    timerElement.style.color = 'red';
                }
                timeLeft--;
            }, 1000);
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === "Shift" || event.ctrlKey || event.key === "Meta") {
                if (!shiftBlocked) {
                    shiftBlocked = true;
                    alert("Warning: Shift, Ctrl, and Meta keys are disabled during the exam.");
                    setTimeout(() => {
                        shiftBlocked = false;
                    }, 1000);
                }
                event.preventDefault();
            }
        });
    </script>
</head>
<body>
    <div id="welcome-screen">
        <img src="Cambright.Lan.png" alt="Cambright Logo" width="200">
        <h2>Welcome to the Cambright Placement Test</h2>
        <p>Our English Placement Test is designed to assess your current proficiency level and help us recommend the most suitable learning program for you.</p>
        <button class="start-btn" onclick="startExam()">Start Exam</button>
    </div>

    <div id="exam-content" class="hidden">
        <h2>Placement Test</h2>
        <p class="timer" id="timer">50:00</p>
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfpBaiBgM_dhm93cIwG9kWKZFSx7E8XM2UxRkb3GOo939GRjA/viewform?embedded=true" width="640" height="800" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
    </div>
</body>
</html>
