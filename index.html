<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambright Placement Test</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        #welcome { margin: 50px; }
        #timer { font-size: 24px; font-weight: bold; color: green; }
        iframe { width: 100%; height: 600px; border: none; }
        .hidden { display: none; }
    </style>
    <script>
        let timeLeft = 50 * 60;
        function startTest() {
            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('exam').classList.remove('hidden');
            countdown();
        }
        function countdown() {
            let timerInterval = setInterval(() => {
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                document.getElementById('timer').innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                if (timeLeft <= 600) { document.getElementById('timer').style.color = 'red'; }
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert('Time is up! Submitting now.');
                    document.getElementById('examFrame').contentWindow.document.querySelector("form").submit();
                }
                timeLeft--;
            }, 1000);
        }
        document.addEventListener('keydown', (event) => {
            if (event.ctrlKey || event.shiftKey || event.key === 'PrintScreen') {
                event.preventDefault();
                alert('Action blocked!');
            }
        });
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) alert('Warning: Do not leave the test window!');
        });
    </script>
</head>
<body>
    <div id="welcome">
        <h2>Welcome to the Cambright Placement Test</h2>
        <p>Our English Placement Test is designed to assess your current proficiency level and help us recommend the most suitable learning program for you.</p>
        <img src="Cambright.Lan.png" alt="Cambright Logo" width="300">
        <br><br>
        <button onclick="startTest()">Start Test</button>
    </div>
    <div id="exam" class="hidden">
        <h2>Placement Test</h2>
        <p id="timer">50:00</p>
        <iframe id="examFrame" src="https://docs.google.com/forms/d/e/1FAIpQLSfpBaiBgM_dhm93cIwG9kWKZFSx7E8XM2UxRkb3GOo939GRjA/viewform?usp=header"></iframe>
    </div>
</body>
</html>
