<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambright Placement Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
            background: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            position: relative;
        }
        #timer {
            font-size: 24px;
            color: green;
            font-weight: bold;
        }
        #examFrame {
            width: 100%;
            height: 600px;
            border: none;
            display: none;
            position: relative;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 9999;
            display: none;
        }
        #startBtn {
            padding: 10px 20px;
            font-size: 16px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #startBtn:hover {
            background-color: darkblue;
        }
        .warning {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container" id="welcomePage">
        <img src="Cambright.Lan.png" alt="Cambright Logo" width="200">
        <h1>Welcome to the Cambright Placement Test</h1>
        <p>Our English Placement Test is designed to assess your current proficiency level and help us recommend the most suitable learning program for you.</p>
        <button id="startBtn" onclick="startExam()">Start Exam</button>
    </div>

    <div class="container" id="examPage" style="display:none;">
        <h2>Placement Test</h2>
        <p>Time Remaining: <span id="timer">50:00</span></p>
        <div id="overlay"></div>
        <iframe id="examFrame" src="https://docs.google.com/forms/d/e/1FAIpQLSfpBaiBgM_dhm93cIwG9kWKZFSx7E8XM2UxRkb3GOo939GRjA/viewform?usp=header"></iframe>
    </div>

    <script>
        let timeLeft = 3000; // 50 minutes in seconds
        let warningIssued = false;
        let isAlertOpen = false; // Track if an alert is currently open

        function startExam() {
            document.getElementById("welcomePage").style.display = "none";
            document.getElementById("examPage").style.display = "block";
            document.getElementById("examFrame").style.display = "block";
            document.getElementById("overlay").style.display = "block";
            startTimer();
        }

        function startTimer() {
            let timerElement = document.getElementById("timer");
            let countdown = setInterval(function () {
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                timerElement.innerHTML = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                
                // Change color to red when 10 minutes are left
                if (timeLeft <= 600 && !warningIssued) {
                    timerElement.style.color = "red";
                    if (!isAlertOpen) {
                        isAlertOpen = true;
                        alert("Warning: Only 10 minutes remaining!");
                        isAlertOpen = false;
                    }
                    warningIssued = true;
                }

                // Notify user when time is up
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    alert("Time is up! Submitting your exam.");
                    document.getElementById("examFrame").contentWindow.document.forms[0].submit();
                }
                timeLeft--;
            }, 1000);
        }

        // Block right-click, copy-paste, and long-press on the overlay
        const overlay = document.getElementById("overlay");

        overlay.addEventListener("contextmenu", function (event) {
            event.preventDefault();
            alert("Right-click is disabled!");
        });

        overlay.addEventListener("copy", function (event) {
            event.preventDefault();
            alert("Copying is disabled!");
        });

        overlay.addEventListener("cut", function (event) {
            event.preventDefault();
            alert("Cutting is disabled!");
        });

        overlay.addEventListener("paste", function (event) {
            event.preventDefault();
            alert("Pasting is disabled!");
        });

        // Allow normal clicks and touches
        overlay.addEventListener("click", function (event) {
            // Allow normal clicks
        });

        overlay.addEventListener("touchstart", function (event) {
            // Allow normal touch interactions
        }, { passive: true });

        // Block Shift, Ctrl, and Right-Click on the entire page
        document.addEventListener("keydown", function (event) {
            if (event.key === "Shift" || event.ctrlKey || event.metaKey) {
                event.preventDefault();
                if (!isAlertOpen) {
                    isAlertOpen = true;
                    alert("Shift, Ctrl, and Right-Click are blocked!");
                    isAlertOpen = false;
                }
            }
        });
    </script>
</body>
</html>
