<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambright Placement Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .container {
            margin-top: 50px;
        }
        #timer {
            font-size: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
    <script>
        let timeLeft = 50 * 60; // 50 minutes in seconds
        let timerInterval;

        function startTest() {
            document.getElementById("welcome").style.display = "none";
            document.getElementById("exam").style.display = "block";
            startTimer();
        }

        function startTimer() {
            timerInterval = setInterval(function () {
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                document.getElementById("timer").innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                
                if (timeLeft <= 600) {
                    document.getElementById("timer").style.color = "red";
                }
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById("examForm").submit();
                }
                timeLeft--;
            }, 1000);
        }
        
        // Block certain keys and actions
        document.addEventListener("keydown", function (event) {
            if (event.ctrlKey || event.shiftKey || event.key === "F12") {
                event.preventDefault();
                alert("This action is disabled during the test.");
            }
        });

        document.addEventListener("contextmenu", function (event) {
            event.preventDefault();
            alert("Right-click is disabled during the test.");
        });

        document.addEventListener("visibilitychange", function () {
            if (document.hidden) {
                alert("Warning: You left the test window!");
            }
        });
    </script>
</head>
<body>
    <div id="welcome" class="container">
        <img src="Cambright.Lan.png" alt="Cambright Logo" width="300">
        <h2>Our English Placement Test is designed to assess your current proficiency level and help us recommend the most suitable learning program for you.</h2>
        <button onclick="startTest()">Start Test</button>
    </div>

    <div id="exam" class="container" style="display: none;">
        <p>Time Left: <span id="timer">50:00</span></p>
        <iframe id="examForm" src="https://docs.google.com/forms/d/e/1FAIpQLSfpBaiBgM_dhm93cIwG9kWKZFSx7E8XM2UxRkb3GOo939GRjA/viewform?embedded=true" width="640" height="800"></iframe>
    </div>
</body>
</html>
