<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambright Placement Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
            background: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        #timer {
            font-size: 24px;
            color: green;
            font-weight: bold;
        }
        #examFrame {
            width: 100%;
            height: 600px;
            border: none;
            display: none;
        }
        #startBtn {
            padding: 10px 20px;
            font-size: 16px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #startBtn:hover {
            background-color: darkblue;
        }
        .warning {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container" id="welcomePage">
        <img src="Cambright.Lan.png" alt="Cambright Logo" width="200">
        <h1>Welcome to the Cambright Placement Test</h1>
        <p>Our English Placement Test is designed to assess your current proficiency level and help us recommend the most suitable learning program for you.</p>
        <button id="startBtn" onclick="startExam()">Start Exam</button>
    </div>

    <div class="container" id="examPage" style="display:none;">
        <h2>Placement Test</h2>
        <p>Time Remaining: <span id="timer">10:00</span></p>
        <iframe id="examFrame" src="https://docs.google.com/forms/d/e/1FAIpQLSfpBaiBgM_dhm93cIwG9kWKZFSx7E8XM2UxRkb3GOo939GRjA/viewform?usp=header"></iframe>
    </div>

    <script>
        let timeLeft = 600; // 10 minutes
        let warningIssued = false;
        let isAlertOpen = false; // Track if an alert is currently open

        function startExam() {
            document.getElementById("welcomePage").style.display = "none";
            document.getElementById("examPage").style.display = "block";
            document.getElementById("examFrame").style.display = "block";
            startTimer();
        }

        function startTimer() {
            let timerElement = document.getElementById("timer");
            let countdown = setInterval(function () {
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                timerElement.innerHTML = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                
                if (timeLeft <= 300 && !warningIssued) {
                    timerElement.style.color = "red";
                    alert("Warning: Only 5 minutes remaining!");
                    warningIssued = true;
                }

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    alert("Time is up! Submitting your exam.");
                    document.getElementById("examFrame").contentWindow.document.forms[0].submit();
                }
                timeLeft--;
            }, 1000);
        }

        // Block Shift, Ctrl, and Right-Click
        document.addEventListener("keydown", function (event) {
            if (event.key === "Shift" || event.ctrlKey || event.metaKey) {
                event.preventDefault();
                if (!isAlertOpen) {
                    isAlertOpen = true;
                    alert("Shift, Ctrl, and Right-Click are blocked!");
                    isAlertOpen = false;
                }
            }
        });

        document.addEventListener("contextmenu", function (event) {
            event.preventDefault();
            if (!isAlertOpen) {
                isAlertOpen = true;
                alert("Right-click is disabled!");
                isAlertOpen = false;
            }
        });

        // Prevent leaving the page
        window.addEventListener("blur", function () {
            if (!isAlertOpen && document.getElementById("examPage").style.display === "block") {
                isAlertOpen = true;
                alert("Warning: Do not leave this page! Your exam will be submitted if you leave.");
                isAlertOpen = false;
                window.focus(); // Bring the page back into focus
            }
        });

        window.addEventListener("beforeunload", function (event) {
            if (document.getElementById("examPage").style.display === "block") {
                event.preventDefault();
                event.returnValue = "Are you sure you want to leave? Your exam will be submitted.";
            }
        });
    </script>
</body>
</html>
